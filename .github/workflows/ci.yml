name: writing-skills CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: "0.9"

jobs:
  # ─────────────────────────────────────────────
  # Shared components
  # ─────────────────────────────────────────────

  shared-unit-tests:
    name: "Shared — Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run shared unit tests
        run: pytest tests/shared/ -v --tb=short

  shared-pattern-coverage:
    name: "Shared — Pattern Coverage (threshold 0.9)"
    runs-on: ubuntu-latest
    needs: shared-unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pattern coverage check
        run: |
          python tools/check_pattern_coverage.py \
            --fixture tests/fixtures/synthetic_ai_doc.txt \
            --threshold ${{ env.COVERAGE_THRESHOLD }}

  shared-determinism:
    name: "Shared — Determinism Tests"
    runs-on: ubuntu-latest
    needs: shared-unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run determinism tests
        run: pytest tests/shared/test_determinism.py -v

  shared-fact-preservation:
    name: "Shared — Fact Preservation Tests"
    runs-on: ubuntu-latest
    needs: shared-unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run fact preservation tests
        run: pytest tests/shared/test_fact_preservation.py -v

  # ─────────────────────────────────────────────
  # Per-skill jobs (matrix)
  # ─────────────────────────────────────────────

  skill-tests:
    name: "Skill — ${{ matrix.skill }}"
    runs-on: ubuntu-latest
    needs: shared-unit-tests
    strategy:
      fail-fast: false
      matrix:
        skill:
          - email-writer
          - correction-email-writer
          - resume-writer
          - resume-editor
          - technical-writer
          - incident-summary-writer
          - stakeholder-update-writer
          - requirements-doc-writer
          - meeting-notes-to-decision-memo
          - linkedin-message-writer
          - cover-letter-writer
          - resume-bullet-rewriter
          - executive-brief-writer
          - executive-summary-writer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run skill unit tests
        run: pytest tests/skills/test_${{ matrix.skill_snake }}.py -v
        env:
          skill_snake: ${{ replace(matrix.skill, '-', '_') }}
      - name: Run pattern coverage against skill examples
        run: |
          python tools/check_pattern_coverage.py \
            --fixture skills/${{ matrix.skill }}/examples/short.json \
            --fixture skills/${{ matrix.skill }}/examples/medium.json \
            --threshold ${{ env.COVERAGE_THRESHOLD }}
        continue-on-error: false

  # ─────────────────────────────────────────────
  # Gate: all must pass before merge
  # ─────────────────────────────────────────────

  ci-gate:
    name: "CI Gate — All checks passed"
    runs-on: ubuntu-latest
    needs:
      - shared-unit-tests
      - shared-pattern-coverage
      - shared-determinism
      - shared-fact-preservation
      - skill-tests
    steps:
      - name: All jobs succeeded
        run: echo "All CI checks passed. Ready to merge."
